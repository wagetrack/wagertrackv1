<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Casino Bonus Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --bg: #050816;
        --card-bg: #111827;
        --accent: #10b981;
        --accent-soft: rgba(16,185,129,0.15);
        --text-main: #f9fafb;
        --text-muted: #9ca3af;
        --danger: #ef4444;
        --border: #1f2933;
        --shadow: 0 18px 40px rgba(0,0,0,0.45);
        --radius-lg: 18px;
        --radius-md: 10px;
    }

    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
        color: var(--text-main);
        padding: 16px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 26px;
    }

    button {
        padding: 12px 18px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        background: linear-gradient(135deg, #22c55e, #0ea5e9);
        color: white;
        width: 100%;
        margin-bottom: 15px;
    }

    .player {
        background: radial-gradient(circle at top left, #1f2937 0, #020617 55%);
        padding: 16px;
        border-radius: 18px;
        margin-bottom: 20px;
        border: 1px solid rgba(148,163,184,0.18);
        box-shadow: var(--shadow);
    }

    .player h2 {
        margin: 0 0 10px 0;
        font-size: 20px;
    }

    label {
        display: block;
        margin-top: 10px;
        font-size: 14px;
        color: var(--text-muted);
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 10px;
        border: 1px solid #2a2f42;
        background: rgba(15,23,42,0.95);
        color: white;
        font-size: 16px;
    }

    .stats {
        margin-top: 15px;
        padding: 12px;
        background: rgba(15,23,42,0.9);
        border-radius: 12px;
    }

    .stats p {
        margin: 6px 0;
        font-size: 15px;
    }

    .progress-bar {
        width: 100%;
        height: 10px;
        background: #333;
        border-radius: 5px;
        margin-top: 10px;
    }

    .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #22c55e, #0ea5e9);
        border-radius: 5px;
        transition: width 0.3s ease;
    }

    .danger {
        background: #ef4444 !important;
    }

    .secondary {
        background: #374151 !important;
    }

    .bet-input {
        margin-top: 12px;
        display: none;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<h1>Casino Bonus Tracker</h1>

<button onclick="addPlayer()">➕ New Player</button>

<div id="players"></div>

<script>
let playerId = 0;

function addPlayer() {
    playerId++;

    const div = document.createElement("div");
    div.className = "player";
    div.id = "player_" + playerId;

    div.innerHTML = `
        <h2>Player #${playerId}</h2>

        <label>Deposit (€)</label>
        <input type="number" id="deposit_${playerId}" min="0" step="0.01">

        <label>Bonus (€)</label>
        <input type="number" id="bonus_${playerId}" min="0" step="0.01">

        <label>Wagering Requirement (x)</label>
        <input type="number" id="wager_${playerId}" min="1" step="1">

        <button onclick="submitStats(${playerId})">Submit Stats</button>

        <div class="stats">
            <p>Required Wager: <span id="required_${playerId}">0.00</span> €</p>
            <p>Total Wagered: <span id="wagered_${playerId}">0.00</span> €</p>
            <p>Remaining: <span id="remaining_${playerId}">0.00</span> €</p>

            <div class="progress-bar">
                <div class="progress-fill" id="progress_${playerId}"></div>
            </div>
            <p id="progressLabel_${playerId}">0% complete</p>
        </div>

        <button id="addBetBtn_${playerId}" onclick="toggleBetInput(${playerId})" class="secondary" disabled>Add Bet</button>

        <div class="bet-input" id="betInput_${playerId}">
            <label>Bet Amount (€)</label>
            <input type="number" id="bet_${playerId}" min="0" step="0.01">
            <button onclick="applyBet(${playerId})">Apply Bet</button>
        </div>

        <button onclick="removePlayer(${playerId})" class="danger">Remove Player</button>
    `;

    document.getElementById("players").appendChild(div);
}

function submitStats(id) {
    const deposit = parseFloat(document.getElementById("deposit_" + id).value) || 0;
    const bonus = parseFloat(document.getElementById("bonus_" + id).value) || 0;
    const wager = parseFloat(document.getElementById("wager_" + id).value) || 0;

    if (deposit <= 0 || wager <= 0) {
        alert("Please enter valid deposit and wagering multiplier.");
        return;
    }

    const required = (deposit + bonus) * wager;

    document.getElementById("required_" + id).innerText = required.toFixed(2);
    document.getElementById("wagered_" + id).innerText = "0.00";
    document.getElementById("remaining_" + id).innerText = required.toFixed(2);

    updateProgress(id);

    document.getElementById("addBetBtn_" + id).disabled = false;

    document.getElementById("deposit_" + id).disabled = true;
    document.getElementById("bonus_" + id).disabled = true;
    document.getElementById("wager_" + id).disabled = true;
}

function toggleBetInput(id) {
    const box = document.getElementById("betInput_" + id);
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function applyBet(id) {
    const bet = parseFloat(document.getElementById("bet_" + id).value) || 0;
    if (bet <= 0) return;

    const required = parseFloat(document.getElementById("required_" + id).innerText);
    let wagered = parseFloat(document.getElementById("wagered_" + id).innerText);

    wagered += bet;

    const remaining = Math.max(required - wagered, 0);

    document.getElementById("wagered_" + id).innerText = wagered.toFixed(2);
    document.getElementById("remaining_" + id).innerText = remaining.toFixed(2);

    updateProgress(id);

    document.getElementById("bet_" + id).value = "";
}

function updateProgress(id) {
    const required = parseFloat(document.getElementById("required_" + id).innerText);
    const wagered = parseFloat(document.getElementById("wagered_" + id).innerText);

    const percent = required > 0 ? Math.min((wagered / required) * 100, 100) : 0;

    document.getElementById("progress_" + id).style.width = percent + "%";
    document.getElementById("progressLabel_" + id).innerText = percent.toFixed(1) + "% complete";
}

function removePlayer(id) {
    document.getElementById("player_" + id).remove();
}
</script>

</body>
</html>
